<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b2fff"/>
    </linearGradient>
    <linearGradient id="g2" x1="20" y1="40" x2="108" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity=".25"/>
      <stop offset="100%" stop-color="#7b2fff" stop-opacity=".08"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#05050f" stroke="url(#g)" stroke-width="2.5"/>
  <circle cx="64" cy="64" r="60" fill="url(#g2)"/>
  <!-- Horizon line -->
  <line x1="24" y1="78" x2="104" y2="78" stroke="url(#g)" stroke-width="2" filter="url(#glow)"/>
  <!-- Sun/arc above horizon -->
  <path d="M44 78 A20 20 0 0 1 84 78" stroke="url(#g)" stroke-width="2.5" fill="none" filter="url(#glow)"/>
  <!-- Grid lines below horizon (perspective) -->
  <line x1="34" y1="78" x2="20" y2="104" stroke="#00d4ff" stroke-width=".7" opacity=".3"/>
  <line x1="52" y1="78" x2="44" y2="104" stroke="#00d4ff" stroke-width=".7" opacity=".3"/>
  <line x1="64" y1="78" x2="64" y2="104" stroke="#00d4ff" stroke-width=".7" opacity=".4"/>
  <line x1="76" y1="78" x2="84" y2="104" stroke="#00d4ff" stroke-width=".7" opacity=".3"/>
  <line x1="94" y1="78" x2="108" y2="104" stroke="#00d4ff" stroke-width=".7" opacity=".3"/>
  <!-- Horizontal grid lines -->
  <line x1="26" y1="86" x2="102" y2="86" stroke="#00d4ff" stroke-width=".5" opacity=".2"/>
  <line x1="22" y1="95" x2="106" y2="95" stroke="#00d4ff" stroke-width=".5" opacity=".15"/>
  <!-- Stars -->
  <circle cx="38" cy="42" r="1.2" fill="#fff" opacity=".6"/>
  <circle cx="72" cy="34" r="1" fill="#fff" opacity=".5"/>
  <circle cx="90" cy="48" r="1.3" fill="#fff" opacity=".4"/>
  <circle cx="52" cy="28" r=".8" fill="#fff" opacity=".3"/>
  <circle cx="82" cy="26" r=".9" fill="#fff" opacity=".35"/>
  <!-- NH text -->
  <text x="64" y="68" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="18" fill="url(#g)" filter="url(#glow)">NH</text>
</svg>
