name: Bug Report
description: Report a bug in a plugin template or example
title: '[Bug]: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please search existing issues first.
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Template - metadata-scraper
        - Template - theme
        - Template - lifecycle
        - Template - widget
        - Example - NEON HORIZON
        - Example - PPE.pl Metadata
        - Example - Description Translator
        - Documentation (README/HOOKS.md)
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Use template ...
        2. Implement hook ...
        3. See error
    validations:
      required: true
  - type: input
    id: gd-version
    attributes:
      label: GamesDownloader Version
      placeholder: '3.0.0'
    validations:
      required: false
